<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="100%" style="stop-color:#065f46"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Grid dots -->
  <g fill="rgba(255,255,255,0.08)">
    <circle cx="25" cy="25" r="2"/><circle cx="40" cy="25" r="2"/><circle cx="55" cy="25" r="2"/><circle cx="70" cy="25" r="2"/>
    <circle cx="25" cy="40" r="2"/><circle cx="40" cy="40" r="2"/><circle cx="55" cy="40" r="2"/><circle cx="70" cy="40" r="2"/>
    <circle cx="25" cy="55" r="2"/><circle cx="40" cy="55" r="2"/><circle cx="55" cy="55" r="2"/><circle cx="70" cy="55" r="2"/>
    <circle cx="25" cy="70" r="2"/><circle cx="40" cy="70" r="2"/><circle cx="55" cy="70" r="2"/><circle cx="70" cy="70" r="2"/>
  </g>
  <!-- Snake body -->
  <rect x="20" y="62" width="13" height="13" rx="3" fill="#34d399"/>
  <rect x="35" y="62" width="13" height="13" rx="3" fill="#34d399"/>
  <rect x="50" y="62" width="13" height="13" rx="3" fill="#34d399"/>
  <rect x="50" y="47" width="13" height="13" rx="3" fill="#34d399"/>
  <rect x="50" y="32" width="13" height="13" rx="3" fill="#34d399"/>
  <!-- Snake head with glow -->
  <rect x="35" y="32" width="13" height="13" rx="3" fill="#6ee7b7" filter="url(#glow)"/>
  <circle cx="39" cy="36" r="2" fill="#064e3b"/>
  <circle cx="45" cy="36" r="2" fill="#064e3b"/>
  <!-- Food -->
  <circle cx="25" cy="35" r="5" fill="#fbbf24"/>
</svg>
