<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Progress ring background -->
  <circle cx="50" cy="52" r="32" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="7"/>
  <!-- Progress ring (about 65% filled) -->
  <circle cx="50" cy="52" r="32" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="7"
    stroke-dasharray="200.96" stroke-dashoffset="70" stroke-linecap="round"
    transform="rotate(-90 50 52)"/>
  <!-- Time text -->
  <text x="50" y="50" text-anchor="middle" dominant-baseline="central"
    font-family="monospace" font-size="16" font-weight="300" fill="white">25:00</text>
  <!-- Small dots for sessions -->
  <circle cx="36" cy="80" r="4" fill="white"/>
  <circle cx="46" cy="80" r="4" fill="white"/>
  <circle cx="56" cy="80" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="66" cy="80" r="4" fill="rgba(255,255,255,0.3)"/>
  <!-- Tomato leaf on top -->
  <ellipse cx="43" cy="17" rx="6" ry="4" fill="#16a34a" transform="rotate(-30 43 17)"/>
  <ellipse cx="57" cy="17" rx="6" ry="4" fill="#16a34a" transform="rotate(30 57 17)"/>
  <rect x="48" y="13" width="4" height="8" rx="2" fill="#16a34a"/>
</svg>
