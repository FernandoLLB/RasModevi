<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bfdbfe"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Photo frame -->
  <rect x="18" y="22" width="64" height="56" rx="5" fill="white"/>
  <rect x="23" y="27" width="54" height="46" rx="3" fill="url(#sky)"/>
  <!-- Mountain landscape -->
  <polygon points="23,73 45,45 58,60 68,48 77,73" fill="#34d399"/>
  <polygon points="45,45 60,65 30,65" fill="#10b981"/>
  <!-- Sun -->
  <circle cx="65" cy="37" r="7" fill="#fbbf24"/>
  <!-- Frame border -->
  <rect x="18" y="22" width="64" height="56" rx="5" fill="none" stroke="white" stroke-width="3"/>
</svg>
