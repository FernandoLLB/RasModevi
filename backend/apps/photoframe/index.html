<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marco de Fotos - ModevI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        .frame {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        .slide.active { opacity: 1; }
        .slide svg {
            width: 80%;
            height: 80%;
            max-width: 600px;
        }
        .caption {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            opacity: 0.7;
            font-weight: 300;
            text-align: center;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }
        .controls {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.5rem;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
        }
        body:hover .controls { opacity: 1; }
        .controls button {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            backdrop-filter: blur(10px);
        }
        .controls button:hover { background: rgba(255,255,255,0.3); }
        .dots-nav {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        .dot-nav {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s;
        }
        .dot-nav.active { background: white; transform: scale(1.3); }
        .upload-area {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            gap: 1rem;
        }
        .upload-area.visible { display: flex; }
        .upload-area h2 { font-weight: 300; font-size: 1.5rem; }
        .upload-area p { opacity: 0.5; font-size: 0.9rem; }
        .upload-btn {
            padding: 0.8rem 2rem;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        .upload-btn:hover { background: #4f46e5; }
        .close-upload {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="frame" id="frame"></div>
    <div class="dots-nav" id="dotsNav"></div>
    <div class="controls">
        <button onclick="prev()">◀</button>
        <button onclick="togglePause()">⏸</button>
        <button onclick="next()">▶</button>
        <button onclick="showUpload()">+</button>
    </div>

    <div class="upload-area" id="uploadArea">
        <button class="close-upload" onclick="hideUpload()">✕</button>
        <h2>Añadir Fotos</h2>
        <p>Selecciona imágenes de tu dispositivo</p>
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Seleccionar Imágenes</button>
    </div>

    <script>
        const defaultSlides = [
            { bg: 'linear-gradient(135deg, #667eea, #764ba2)', caption: 'Atardecer violeta', emoji: '🌅' },
            { bg: 'linear-gradient(135deg, #f093fb, #f5576c)', caption: 'Rosa del amanecer', emoji: '🌸' },
            { bg: 'linear-gradient(135deg, #4facfe, #00f2fe)', caption: 'Océano infinito', emoji: '🌊' },
            { bg: 'linear-gradient(135deg, #43e97b, #38f9d7)', caption: 'Bosque esmeralda', emoji: '🌿' },
            { bg: 'linear-gradient(135deg, #fa709a, #fee140)', caption: 'Tarde dorada', emoji: '☀️' },
        ];

        let slides = [...defaultSlides];
        let current = 0;
        let paused = false;
        let timer;

        function render() {
            const frame = document.getElementById('frame');
            const nav = document.getElementById('dotsNav');
            frame.innerHTML = '';
            nav.innerHTML = '';

            slides.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = 'slide' + (i === current ? ' active' : '');
                if (s.url) {
                    div.style.background = `url(${s.url}) center/cover`;
                } else {
                    div.style.background = s.bg;
                    div.innerHTML = `<span style="font-size:8rem">${s.emoji}</span>`;
                }
                div.innerHTML += `<div class="caption">${s.caption}</div>`;
                frame.appendChild(div);

                const dot = document.createElement('div');
                dot.className = 'dot-nav' + (i === current ? ' active' : '');
                dot.onclick = () => goTo(i);
                nav.appendChild(dot);
            });
        }

        function goTo(i) { current = i; render(); }
        function next() { current = (current + 1) % slides.length; render(); }
        function prev() { current = (current - 1 + slides.length) % slides.length; render(); }
        function togglePause() { paused = !paused; }

        function showUpload() { document.getElementById('uploadArea').classList.add('visible'); }
        function hideUpload() { document.getElementById('uploadArea').classList.remove('visible'); }

        document.getElementById('fileInput').addEventListener('change', (e) => {
            for (const file of e.target.files) {
                const url = URL.createObjectURL(file);
                slides.push({ url, caption: file.name.replace(/\.[^.]+$/, '') });
            }
            hideUpload();
            render();
        });

        render();
        setInterval(() => { if (!paused) next(); }, 5000);
    </script>
</body>
</html>
