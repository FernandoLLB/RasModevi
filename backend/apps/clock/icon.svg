<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Clock face -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <circle cx="50" cy="50" r="2.5" fill="white"/>
  <!-- Hour ticks -->
  <line x1="50" y1="22" x2="50" y2="27" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="73" x2="50" y2="78" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="50" x2="27" y2="50" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="73" y1="50" x2="78" y2="50" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Hour hand (pointing ~10 o'clock) -->
  <line x1="50" y1="50" x2="38" y2="36" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~2 o'clock) -->
  <line x1="50" y1="50" x2="64" y2="34" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round"/>
</svg>
