<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, height=480">
<title>Calculadora Científica — ModevI</title>
<style>
:root {
  --bg-primary: #0f0f1a;
  --bg-secondary: #1a1a2e;
  --bg-display: #0a0a14;
  --accent: #6c63ff;
  --accent-glow: rgba(108,99,255,0.3);
  --btn-num: #1e1e36;
  --btn-num-h: #2a2a4a;
  --btn-op: #2d2b55;
  --btn-op-h: #3d3b75;
  --btn-func: #1a1a3e;
  --btn-func-h: #2a2a5e;
  --btn-eq: #6c63ff;
  --btn-eq-h: #7b73ff;
  --btn-cl: #e74c3c;
  --btn-mem: rgba(243,156,18,0.15);
  --text: #f0f0f0;
  --text2: #8888aa;
  --text3: #555577;
  --border: rgba(108,99,255,0.15);
  --r: 8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:800px;height:480px;overflow:hidden;background:var(--bg-primary);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
.app{width:800px;height:480px;display:flex;flex-direction:column;padding:6px;gap:5px}
/* Header */
.header{display:flex;align-items:center;justify-content:space-between;height:30px;padding:0 8px;flex-shrink:0}
.title{font-size:14px;font-weight:600;color:var(--text2)}
.mode-btns{display:flex;gap:3px}
.mbtn{background:var(--bg-secondary);border:1px solid var(--border);color:var(--text2);padding:3px 10px;border-radius:5px;font-size:11px;cursor:pointer}
.mbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Display */
.display{background:var(--bg-display);border:1px solid var(--border);border-radius:var(--r);padding:6px 12px;height:82px;display:flex;flex-direction:column;justify-content:flex-end;position:relative;flex-shrink:0;box-shadow:inset 0 2px 8px rgba(0,0,0,0.5)}
.d-hist{font-size:12px;color:var(--text3);text-align:right;height:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d-expr{font-size:14px;color:var(--text2);text-align:right;height:18px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d-res{font-size:30px;font-weight:700;color:var(--text);text-align:right;height:38px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.15;transition:color .2s}
.d-res.err{color:var(--btn-cl);font-size:20px}
.badge{position:absolute;top:6px;left:10px;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600}
.ang-badge{color:var(--accent);background:rgba(108,99,255,0.12)}
.mem-badge{color:#f39c12;background:rgba(243,156,18,0.12);display:none}
.mem-badge.show{display:block}
/* Buttons area */
.btns-area{flex:1;display:flex;gap:4px;min-height:0}
.sci{display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(6,1fr);gap:3px;width:305px;flex-shrink:0}
.main{flex:1;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(6,1fr);gap:3px}
.btn{display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .12s;min-height:42px;position:relative;overflow:hidden;font-family:inherit;outline:none}
.btn:active{transform:scale(0.93);filter:brightness(1.3)}
.n{background:var(--btn-num);color:var(--text);font-size:17px;font-weight:600}
.n:active{background:var(--btn-num-h)}
.o{background:var(--btn-op);color:#a8a4ff;font-size:17px;font-weight:600}
.o:active{background:var(--btn-op-h)}
.f{background:var(--btn-func);color:var(--text2);font-size:12px}
.f:active{background:var(--btn-func-h)}
.eq{background:linear-gradient(135deg,var(--btn-eq),#5a52d5);color:#fff;font-size:20px;font-weight:700;border-color:transparent;box-shadow:0 2px 12px var(--accent-glow)}
.eq:active{filter:brightness(1.2)}
.cl{background:rgba(231,76,60,.12);color:var(--btn-cl);font-size:12px;font-weight:600}
.cl:active{background:rgba(231,76,60,.25)}
.mem{background:var(--btn-mem);color:#f39c12;font-size:11px;font-weight:600}
.mem:active{background:rgba(243,156,18,.3)}
.f2a{background:rgba(108,99,255,.2);color:var(--accent)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title">⊞ Calculadora Científica</div>
    <div class="mode-btns">
      <button class="mbtn active" id="bDeg" onclick="setMode('DEG')">DEG</button>
      <button class="mbtn" id="bRad" onclick="setMode('RAD')">RAD</button>
    </div>
  </div>

  <div class="display">
    <span class="badge ang-badge" id="angBadge">DEG</span>
    <span class="badge mem-badge" id="memBadge" style="left:58px">M</span>
    <div class="d-hist" id="dHist"></div>
    <div class="d-expr" id="dExpr"></div>
    <div class="d-res" id="dRes">0</div>
  </div>

  <div class="btns-area">
    <!-- Scientific -->
    <div class="sci">
      <button class="btn f" id="b2nd" onclick="tog2nd()">2nd</button>
      <button class="btn f" id="bSin" onclick="sf('sin')">sin</button>
      <button class="btn f" id="bCos" onclick="sf('cos')">cos</button>
      <button class="btn f" id="bTan" onclick="sf('tan')">tan</button>
      <button class="btn f" onclick="sf('ln')">ln</button>

      <button class="btn f" onclick="ins('π')">π</button>
      <button class="btn f" id="bSinh" onclick="sf('sinh')">sinh</button>
      <button class="btn f" id="bCosh" onclick="sf('cosh')">cosh</button>
      <button class="btn f" id="bTanh" onclick="sf('tanh')">tanh</button>
      <button class="btn f" onclick="sf('log')">log</button>

      <button class="btn f" onclick="ins('e')">e</button>
      <button class="btn f" onclick="sf('x²')">x²</button>
      <button class="btn f" onclick="sf('x³')">x³</button>
      <button class="btn f" onclick="sf('xʸ')">x<sup>y</sup></button>
      <button class="btn f" onclick="sf('10ˣ')">10<sup>x</sup></button>

      <button class="btn f" onclick="sf('√')">√</button>
      <button class="btn f" onclick="sf('³√')">³√</button>
      <button class="btn f" onclick="sf('ʸ√')">ʸ√x</button>
      <button class="btn f" onclick="sf('1/x')">1/x</button>
      <button class="btn f" onclick="sf('eˣ')">e<sup>x</sup></button>

      <button class="btn f" onclick="sf('n!')">n!</button>
      <button class="btn f" onclick="sf('|x|')">|x|</button>
      <button class="btn f" onclick="ins('(')">(</button>
      <button class="btn f" onclick="ins(')')">)</button>
      <button class="btn f" onclick="sf('%')">%</button>

      <button class="btn mem" onclick="mf('MC')">MC</button>
      <button class="btn mem" onclick="mf('MR')">MR</button>
      <button class="btn mem" onclick="mf('M+')">M+</button>
      <button class="btn mem" onclick="mf('M-')">M−</button>
      <button class="btn mem" onclick="mf('MS')">MS</button>
    </div>

    <!-- Main -->
    <div class="main">
      <button class="btn cl" onclick="ca()">AC</button>
      <button class="btn cl" onclick="ce()">CE</button>
      <button class="btn f" onclick="bk()">⌫</button>
      <button class="btn o" onclick="op('÷')">÷</button>

      <button class="btn n" onclick="num('7')">7</button>
      <button class="btn n" onclick="num('8')">8</button>
      <button class="btn n" onclick="num('9')">9</button>
      <button class="btn o" onclick="op('×')">×</button>

      <button class="btn n" onclick="num('4')">4</button>
      <button class="btn n" onclick="num('5')">5</button>
      <button class="btn n" onclick="num('6')">6</button>
      <button class="btn o" onclick="op('−')">−</button>

      <button class="btn n" onclick="num('1')">1</button>
      <button class="btn n" onclick="num('2')">2</button>
      <button class="btn n" onclick="num('3')">3</button>
      <button class="btn o" onclick="op('+')">+</button>

      <button class="btn n" onclick="sgn()">±</button>
      <button class="btn n" onclick="num('0')">0</button>
      <button class="btn n" onclick="dot()">.</button>
      <button class="btn eq" onclick="calc()">=</button>

      <button class="btn f" onclick="sf('Rand')">Rand</button>
      <button class="btn f" onclick="ins('EXP')">EXP</button>
      <button class="btn o" onclick="op('^')">^</button>
      <button class="btn f" onclick="op('mod')">mod</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────
let expr = '', dispExpr = '', res = '0', hist = '';
let angleMode = 'DEG', mode2nd = false, memory = 0, hasMemory = false;
let justCalc = false;

// ── Audio ──────────────────────────────────────────────
let actx = null;
function click() {
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.frequency.value = 600; o.type = 'sine';
    g.gain.setValueAtTime(0.05, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.05);
    o.start(); o.stop(actx.currentTime + 0.05);
  } catch(e){}
}

// ── Display ────────────────────────────────────────────
const dRes = document.getElementById('dRes');
const dExpr = document.getElementById('dExpr');
const dHist = document.getElementById('dHist');
const memBadge = document.getElementById('memBadge');

function upd() {
  dRes.textContent = res || '0';
  dRes.className = 'd-res';
  dExpr.textContent = dispExpr;
  dHist.textContent = hist;
  memBadge.className = hasMemory ? 'badge mem-badge show' : 'badge mem-badge';
}

function showErr(msg) {
  dRes.textContent = msg;
  dRes.className = 'd-res err';
  setTimeout(() => { res = '0'; upd(); }, 2000);
}

// ── Angle mode ─────────────────────────────────────────
function setMode(m) {
  click();
  angleMode = m;
  document.getElementById('bDeg').className = m==='DEG'?'mbtn active':'mbtn';
  document.getElementById('bRad').className = m==='RAD'?'mbtn active':'mbtn';
  document.getElementById('angBadge').textContent = m;
}

function toRad(v) { return angleMode==='DEG' ? v*Math.PI/180 : v; }
function toDeg(v) { return angleMode==='DEG' ? v*180/Math.PI : v; }

// ── 2nd mode ───────────────────────────────────────────
function tog2nd() {
  click();
  mode2nd = !mode2nd;
  document.getElementById('b2nd').className = mode2nd ? 'btn f f2a' : 'btn f';
  const labels = {bSin:['sin','sin⁻¹'],bCos:['cos','cos⁻¹'],bTan:['tan','tan⁻¹'],
                  bSinh:['sinh','sinh⁻¹'],bCosh:['cosh','cosh⁻¹'],bTanh:['tanh','tanh⁻¹']};
  for (const [id,[n,a]] of Object.entries(labels))
    document.getElementById(id).textContent = mode2nd ? a : n;
}

// ── Number input ───────────────────────────────────────
function num(n) {
  click();
  if (justCalc) { expr=''; dispExpr=''; res='0'; justCalc=false; }
  if (res==='0' && n!=='0') res=n;
  else if (res==='0' && n==='0') res='0';
  else { if (res.replace(/\D/g,'').length>=15) return; res+=n; }
  upd();
}

function dot() {
  click();
  if (justCalc) { expr=''; dispExpr=''; res='0'; justCalc=false; }
  if (!res.includes('.')) res+='.';
  upd();
}

function ins(t) {
  click();
  if (justCalc) { expr=''; dispExpr=''; justCalc=false; }
  if (t==='π') res=String(Math.PI);
  else if (t==='e') res=String(Math.E);
  else if (t==='(' || t===')') { dispExpr+=t; expr+=t; }
  else if (t==='EXP') res+='e+';
  upd();
}

// ── Operators ──────────────────────────────────────────
function op(o) {
  click();
  justCalc=false;
  const cur = res||'0';
  if (expr!=='' && res!=='0' && res!=='') {
    const ev = evalExpr(expr+cur);
    if (ev!==null) { expr=fmt(ev)+' '+o+' '; dispExpr=expr; res='0'; }
    else { expr+=cur+' '+o+' '; dispExpr=expr; res='0'; }
  } else if (expr==='') {
    expr=cur+' '+o+' '; dispExpr=expr; res='0';
  } else {
    expr=expr.trimEnd().replace(/[+\−×÷\^]$|mod$/,'').trimEnd()+' '+o+' ';
    dispExpr=expr;
  }
  upd();
}

// ── Scientific functions ───────────────────────────────
function sf(fn) {
  click();
  let v=parseFloat(res)||0, out=null, lbl=fn;
  switch(fn) {
    case 'sin': out=mode2nd?toDeg(Math.asin(v)):Math.sin(toRad(v)); lbl=mode2nd?'sin⁻¹':'sin'; break;
    case 'cos': out=mode2nd?toDeg(Math.acos(v)):Math.cos(toRad(v)); lbl=mode2nd?'cos⁻¹':'cos'; break;
    case 'tan': out=mode2nd?toDeg(Math.atan(v)):Math.tan(toRad(v)); lbl=mode2nd?'tan⁻¹':'tan'; break;
    case 'sinh': out=mode2nd?Math.asinh(v):Math.sinh(v); lbl=mode2nd?'sinh⁻¹':'sinh'; break;
    case 'cosh': out=mode2nd?Math.acosh(v):Math.cosh(v); lbl=mode2nd?'cosh⁻¹':'cosh'; break;
    case 'tanh': out=mode2nd?Math.atanh(v):Math.tanh(v); lbl=mode2nd?'tanh⁻¹':'tanh'; break;
    case 'ln': out=Math.log(v); break;
    case 'log': out=Math.log10(v); break;
    case 'x²': out=v*v; lbl='sqr'; break;
    case 'x³': out=v*v*v; lbl='cube'; break;
    case 'xʸ': op('^'); return;
    case '10ˣ': out=Math.pow(10,v); lbl='10^'; break;
    case 'eˣ': out=Math.exp(v); lbl='e^'; break;
    case '√': out=Math.sqrt(v); break;
    case '³√': out=Math.cbrt(v); break;
    case 'ʸ√': op('ʸ√'); return;
    case '1/x':
      if(v===0){showErr('División por cero');return;}
      out=1/v; lbl='1/'; break;
    case 'n!':
      if(v<0){showErr('n! indefinido');return;}
      if(v>170){showErr('Número muy grande');return;}
      out=v===Math.floor(v)?factorial(v):gamma(v+1); lbl='fact'; break;
    case '|x|': out=Math.abs(v); lbl='abs'; break;
    case '%': out=v/100; break;
    case 'Rand': out=Math.random(); lbl='rand'; break;
  }
  if(out===null) return;
  if(!isFinite(out)||isNaN(out)){showErr('Resultado no definido');return;}
  hist=lbl+'('+fmt(v)+')';
  res=fmt(out); justCalc=true;
  upd();
}

// ── Memory ─────────────────────────────────────────────
function mf(cmd) {
  click();
  const v=parseFloat(res)||0;
  if(cmd==='MC'){memory=0;hasMemory=false;}
  else if(cmd==='MR'){res=fmt(memory);justCalc=true;}
  else if(cmd==='M+'){memory+=v;hasMemory=true;}
  else if(cmd==='M-'){memory-=v;hasMemory=true;}
  else if(cmd==='MS'){memory=v;hasMemory=true;}
  upd();
}

// ── Edit ops ───────────────────────────────────────────
function sgn(){click();if(res==='0')return;res=res.startsWith('-')?res.slice(1):'-'+res;upd();}
function bk(){click();if(justCalc)return;res=res.length>1?res.slice(0,-1):'0';upd();}
function ce(){click();res='0';justCalc=false;upd();}
function ca(){click();expr='';dispExpr='';res='0';hist='';justCalc=false;upd();}

// ── Calculate ──────────────────────────────────────────
function calc() {
  click();
  const full = expr+res;
  if(!full.trim()) return;
  const r = evalExpr(full);
  if(r!==null && isFinite(r) && !isNaN(r)) {
    hist=full.trim()+' =';
    dispExpr=''; expr='';
    res=fmt(r); justCalc=true;
    upd();
    try{window.ModevI.notify.toast('Listo','success');}catch(e){}
  } else {
    showErr('Expresión inválida');
  }
}

// ── Expression evaluator ───────────────────────────────
function evalExpr(raw) {
  try {
    // Normalise operators
    let s = raw
      .replace(/×/g,'*')
      .replace(/÷/g,'/')
      .replace(/−/g,'-')
      .replace(/\^/g,'**')
      .replace(/mod/gi,'%')
      .replace(/π/g, String(Math.PI))
      .replace(/\be\b/g, String(Math.E));

    // Validate: only allow safe chars
    if(!/^[\d\s\+\-\*\/\(\)\.\%\*eE]+$/.test(s)) return null;

    // eslint-disable-next-line no-new-func
    const r = Function('"use strict";return('+s+')')();
    return typeof r==='number' ? r : null;
  } catch(e) { return null; }
}

// ── Helpers ────────────────────────────────────────────
function fmt(n) {
  if(Math.abs(n)>=1e15||( Math.abs(n)<1e-10&&n!==0)) return n.toExponential(6);
  const s=String(parseFloat(n.toPrecision(12)));
  return s;
}

function factorial(n) {
  if(n<=1) return 1;
  let r=1; for(let i=2;i<=n;i++) r*=i; return r;
}

function gamma(z) {
  if(z<0.5) return Math.PI/(Math.sin(Math.PI*z)*gamma(1-z));
  z-=1;
  const c=[0.99999999999980993,676.5203681218851,-1259.1392167224028,771.32342877765313,
    -176.61502916214059,12.507343278686905,-0.13857109526572012,9.9843695780195716e-6,1.5056327351493116e-7];
  let x=c[0];
  for(let i=1;i<9;i++) x+=c[i]/(z+i);
  const t=z+7.5;
  return Math.sqrt(2*Math.PI)*Math.pow(t,z+0.5)*Math.exp(-t)*x;
}

// ── Init ───────────────────────────────────────────────
upd();
</script>
</body>
</html>
